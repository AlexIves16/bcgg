name: Production Build

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build APK (Production)
        run: flutter build apk --release --dart-define=SERVER_URL=https://bcgg-production.up.railway.app
        
      - name: Get Build Number
        id: build_number
        run: echo "BUILD_NUMBER=$(grep 'version:' pubspec.yaml | cut -d '+' -f 2)" >> $GITHUB_OUTPUT

      - name: Create Production Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          tag_name: v${{ steps.build_number.outputs.BUILD_NUMBER }}
          name: Digital Ether v${{ steps.build_number.outputs.BUILD_NUMBER }}
          body: "Official production release build from master branch."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
